# IP Spoofing koruması
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# SYN flood koruması
net.ipv4.tcp_syncookies = 1

# IP yönlendirme kapalı (sunucu değilse)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# ICMP redirect kabul etme
net.ipv4.conf.all.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0

# Source routing kapalı
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# Kernel pointer kısıtlaması (KASLR güçlendirme)
kernel.kptr_restrict = 2

# ptrace sınırlama (sadece root veya aynı kullanıcı)
kernel.yama.ptrace_scope = 2

# Modül yüklemeyi tamamen kapat (hacklenemezlik için şart)
kernel.modules_disabled = 1

# Core dump kapat
fs.suid_dumpable = 0
kernel.core_pattern = |/bin/false

# ASLR tam etkin
kernel.randomize_va_space = 2

# Magic SysRq kapat
kernel.sysrq = 0

# Log martian paketler
net.ipv4.conf.all.log_martians = 1
kernel.modules_disabled=1
